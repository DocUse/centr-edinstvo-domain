<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЕДИНСТВО — анкета кандидата</title>
  <meta
    name="description"
    content="ЕДИНСТВО — доменная оболочка для анкеты кандидата поверх Google Apps Script."
  />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260511a" />
  <link rel="shortcut icon" href="./favicon.svg?v=20260511a" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b1020;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .frame-wrap {
      width: 100%;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <iframe
      id="site-frame"
      title="ЕДИНСТВО — анкета кандидата"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
      allow="clipboard-write"
    ></iframe>
  </div>
  <script>
    (function () {
      var iframe = document.getElementById('site-frame');
      if (!iframe) return;

      var appUrl = new URL('https://script.google.com/macros/s/AKfycbzEaiFm9oVjORhqKG5UguXAPTVH2CLjcFg0tIkVy1jMkHsHKURuG2WtCMQ76M6v3VsY/exec');
      var wrapperUrl = new URL(window.location.href);

      if (wrapperUrl.search) {
        appUrl.search = wrapperUrl.search;
      }

      appUrl.searchParams.set('wrapper_origin', wrapperUrl.origin);

      iframe.src = appUrl.toString();

      if (wrapperUrl.searchParams.has('login_token')) {
        wrapperUrl.searchParams.delete('login_token');
        var nextUrl =
          wrapperUrl.pathname +
          (wrapperUrl.search ? wrapperUrl.search : '') +
          (wrapperUrl.hash ? wrapperUrl.hash : '');
        window.history.replaceState(null, '', nextUrl);
      }
    })();
  </script>
</body>
</html>
